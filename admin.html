<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打卡後台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 16px rgba(102,126,234,0.3);
    }

    header h1 { font-size: 20px; font-weight: 700; }
    header span { font-size: 13px; opacity: 0.8; }

    .main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

    /* 登入畫面 */
    #loginBox {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      margin: 60px auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      text-align: center;
    }

    #loginBox h2 { margin-bottom: 8px; color: #222; }
    #loginBox p  { color: #888; font-size: 13px; margin-bottom: 24px; }

    input[type=password] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input[type=password]:focus { border-color: #667eea; }

    /* 統計卡片 */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 22px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .stat-card .label { font-size: 12px; color: #999; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #222; }
    .stat-card .value span { font-size: 14px; color: #667eea; margin-left: 4px; }

    /* 篩選列 */
    .toolbar {
      background: white;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .toolbar input, .toolbar select {
      padding: 9px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .toolbar input:focus, .toolbar select:focus { border-color: #667eea; }

    /* 表格 */
    .table-wrap {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #f7f8fc; }

    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 12px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f0f0f0;
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f9f9f9;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      object-fit: cover;
      vertical-align: middle;
      margin-right: 8px;
      border: 2px solid #eee;
    }

    .avatar-placeholder {
      display: inline-block;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      line-height: 34px;
      font-size: 14px;
      font-weight: 600;
      margin-right: 8px;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .empty {
      text-align: center;
      padding: 48px;
      color: #bbb;
      font-size: 15px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; width: 100%; padding: 13px; border-radius: 10px; font-size: 15px; }
    .btn-export  { background: #e8f5e9; color: #2e7d32; }
    .btn-refresh { background: #e3f2fd; color: #1565c0; }

    .loading { text-align: center; padding: 40px; color: #999; }

    #dashboard { display: none; }
  </style>
</head>
<body>

<header>
  <h1>📋 打卡後台管理</h1>
  <span id="headerInfo">食香園執勤系統</span>
</header>

<div class="main">

  <!-- 登入 -->
  <div id="loginBox">
    <h2>🔐 管理員登入</h2>
    <p>請輸入後台管理密碼</p>
    <input type="password" id="pwInput" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-primary" onclick="login()">登入</button>
    <p id="loginErr" style="color:#e53935;font-size:13px;margin-top:12px;display:none;">密碼錯誤，請重試</p>
  </div>

  <!-- 後台 -->
  <div id="dashboard">
    <div class="stats">
      <div class="stat-card">
        <div class="label">今日打卡人次</div>
        <div class="value" id="statToday">0 <span>人次</span></div>
      </div>
      <div class="stat-card">
        <div class="label">本月累計</div>
        <div class="value" id="statMonth">0 <span>人次</span></div>
      </div>
      <div class="stat-card">
        <div class="label">總紀錄數</div>
        <div class="value" id="statTotal">0 <span>筆</span></div>
      </div>
    </div>

    <div class="toolbar">
      <input type="date" id="filterDate" onchange="renderTable()">
      <input type="text" id="filterName" placeholder="搜尋姓名..." oninput="renderTable()">
      <select id="filterLoc" onchange="renderTable()">
        <option value="">全部地點</option>
      </select>
      <button class="btn btn-refresh" onclick="loadData()">🔄 重新整理</button>
      <button class="btn btn-export" onclick="exportCSV()">⬇️ 匯出 CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>員工</th>
            <th>打卡時間</th>
            <th>執勤地點</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="4" class="loading">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // =============================================
  //  ⚙️ 請修改以下設定
  // =============================================
  const SUPABASE_URL  = 'https://wfyifbqnlpymxnhzbpct.supabase.co';    // ← 貼上 Supabase Project URL
  const SUPABASE_KEY  = 'sb_publishable_s0VnRMtScjVs-ij-_nbkdw_JUiFuWiU'; // ← 貼上 anon public key
  const ADMIN_PASSWORD = '1234';               // ← 改成你想要的後台密碼
  // =============================================

  let allRecords = [];

  function login() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  async function loadData() {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="loading">載入中...</td></tr>';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/attendance?order=timestamp.desc&limit=500`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      allRecords = await res.json();
      updateStats();
      updateLocationFilter();
      renderTable();
    } catch(e) {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" class="empty">⚠️ 載入失敗：${e.message}</td></tr>`;
    }
  }

  function updateStats() {
    const today = new Date().toDateString();
    const month = new Date().getMonth();
    document.getElementById('statToday').innerHTML = allRecords.filter(r => new Date(r.timestamp).toDateString() === today).length + ' <span>人次</span>';
    document.getElementById('statMonth').innerHTML = allRecords.filter(r => new Date(r.timestamp).getMonth() === month).length + ' <span>人次</span>';
    document.getElementById('statTotal').innerHTML = allRecords.length + ' <span>筆</span>';
  }

  function updateLocationFilter() {
    const locs = [...new Set(allRecords.map(r => r.location).filter(Boolean))];
    const sel = document.getElementById('filterLoc');
    sel.innerHTML = '<option value="">全部地點</option>' + locs.map(l => `<option>${l}</option>`).join('');
  }

  function renderTable() {
    const date = document.getElementById('filterDate').value;
    const name = document.getElementById('filterName').value.toLowerCase();
    const loc  = document.getElementById('filterLoc').value;

    let data = allRecords.filter(r => {
      const d = new Date(r.timestamp);
      if (date && d.toISOString().slice(0,10) !== date) return false;
      if (name && !r.user_name.toLowerCase().includes(name)) return false;
      if (loc  && r.location !== loc) return false;
      return true;
    });

    if (data.length === 0) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="empty">📭 沒有符合的紀錄</td></tr>';
      return;
    }

    document.getElementById('tableBody').innerHTML = data.map(r => {
      const dt = new Date(r.timestamp);
      const dateStr = dt.toLocaleDateString('zh-TW');
      const timeStr = dt.toLocaleTimeString('zh-TW');
      const avatarHtml = r.picture
        ? `<img class="avatar" src="${r.picture}" onerror="this.style.display='none'">`
        : `<span class="avatar-placeholder">${r.user_name[0]}</span>`;
      return `
        <tr>
          <td>${avatarHtml}${r.user_name}</td>
          <td>${dateStr} ${timeStr}</td>
          <td>📍 ${r.location || '--'}</td>
          <td><span class="badge">✅ 已打卡</span></td>
        </tr>
      `;
    }).join('');
  }

  function exportCSV() {
    const headers = ['姓名', '打卡時間', '執勤地點', '狀態'];
    const rows = allRecords.map(r => [
      r.user_name,
      new Date(r.timestamp).toLocaleString('zh-TW'),
      r.location || '',
      '已打卡'
    ]);
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `打卡紀錄_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  // 預設今天日期
  document.getElementById('filterDate').value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
