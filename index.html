<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>員工執勤打卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 36px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(102,126,234,0.4);
        }

        h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 6px; font-weight: 700; }

        .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #667eea;
            margin: 0 auto 8px;
            display: none;
            object-fit: cover;
        }

        .info-box {
            background: #f7f8fc;
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #edf0fb;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }

        .info-item:last-child { border-bottom: none; }

        .info-label { color: #888; }

        .info-value { color: #222; font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }

        .btn-checkin {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            box-shadow: 0 6px 20px rgba(102,126,234,0.35);
        }

        .btn-checkin:active:not(:disabled) { transform: scale(0.97); }

        .btn-checkin:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            text-align: left;
        }

        .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .status.error   { background: #fdecea; color: #c62828; display: block; }
        .status.loading { background: #fff8e1; color: #f57f17; display: block; }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(245,127,23,0.3);
            border-top-color: #f57f17;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .history {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        .history h3 { color: #444; font-size: 14px; margin-bottom: 12px; text-align: left; }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f7f8fc;
            border-radius: 10px;
            margin-bottom: 7px;
            font-size: 13px;
        }

        .history-time { color: #666; }
        .history-loc  { color: #667eea; font-weight: 600; }

        .no-record { color: #aaa; font-size: 13px; text-align: center; padding: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <img class="avatar" id="avatar" alt="頭像">
    <div class="logo" id="logoEmoji">📍</div>

    <h1>執勤打卡系統</h1>
    <p class="subtitle">請確認資訊後點擊打卡</p>

    <div class="info-box">
        <div class="info-item">
            <span class="info-label">員工姓名</span>
            <span class="info-value" id="userName">載入中...</span>
        </div>
        <div class="info-item">
            <span class="info-label">目前時間</span>
            <span class="info-value" id="currentTime">--:--:--</span>
        </div>
        <div class="info-item">
            <span class="info-label">執勤地點</span>
            <span class="info-value" id="location">--</span>
        </div>
    </div>

    <button class="btn-checkin" id="checkinBtn" onclick="doCheckin()">確認打卡</button>

    <div class="status" id="status"></div>

    <div class="history" id="historySection" style="display:none;">
        <h3>📋 今日打卡紀錄</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // =============================================
    //  ⚙️  請修改以下設定
    // =============================================
    const CONFIG = {
        LIFF_ID:  '2009407912-jzTn23cb',
        API_URL:  '/api/checkin',        // Vercel Serverless Function
        DEFAULT_LOCATION: '食香園'      // 預設地點名稱
    };
    // =============================================

    let userProfile = null;

    async function initLIFF() {
        try {
            await liff.init({ liffId: CONFIG.LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: location.href });
                return;
            }

            userProfile = await liff.getProfile();

            // 顯示頭像（替換 emoji logo）
            const avatar = document.getElementById('avatar');
            if (userProfile.pictureUrl) {
                avatar.src = userProfile.pictureUrl;
                avatar.style.display = 'block';
                document.getElementById('logoEmoji').style.display = 'none';
            }

            document.getElementById('userName').textContent = userProfile.displayName;

            // 地點從 URL 參數讀取：?location=食香園
            const params = new URLSearchParams(location.search);
            const loc = params.get('location') || CONFIG.DEFAULT_LOCATION;
            document.getElementById('location').textContent = loc;

            updateTime();
            setInterval(updateTime, 1000);
            loadTodayHistory();

        } catch (err) {
            console.error('LIFF init error:', err);
            document.getElementById('userName').textContent = '無法載入';
            showStatus('⚠️ 系統初始化失敗，請關閉後重新開啟', 'error');
        }
    }

    function updateTime() {
        document.getElementById('currentTime').textContent =
            new Date().toLocaleTimeString('zh-TW');
    }

    async function doCheckin() {
        if (!userProfile) {
            showStatus('⚠️ 尚未取得使用者資訊，請重新整理', 'error');
            return;
        }

        const btn = document.getElementById('checkinBtn');
        btn.disabled = true;
        showStatus('<span class="spinner"></span> 處理中...', 'loading');

        const location = document.getElementById('location').textContent;
        const now = new Date();

        const record = {
            userId:    userProfile.userId,
            userName:  userProfile.displayName,
            picture:   userProfile.pictureUrl || '',
            location:  location,
            timestamp: now.toISOString(),
            type:      'checkin'
        };

        // 本地儲存
        saveToHistory(record);

        // 發送到後端 API（若有設定）
        if (CONFIG.API_URL) {
            try {
                const res = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(record)
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
            } catch (e) {
                console.warn('後端同步失敗（僅本地儲存）:', e);
            }
        }

        const timeStr = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = now.toLocaleDateString('zh-TW');
        showStatus(`✅ 打卡成功！<br>📅 ${dateStr}　⏰ ${timeStr}<br>📍 ${location}`, 'success');
        loadTodayHistory();

        // 2 秒後自動關閉 LIFF 視窗
        setTimeout(() => {
            if (liff.isInClient()) liff.closeWindow();
            else btn.disabled = false;
        }, 2500);
    }

    function showStatus(msg, type) {
        const el = document.getElementById('status');
        el.innerHTML = msg;
        el.className = 'status ' + type;
    }

    function getStorageKey() {
        const today = new Date().toDateString();
        return `checkin_${today}_${userProfile?.userId || 'guest'}`;
    }

    function saveToHistory(data) {
        try {
            const key = getStorageKey();
            const arr = JSON.parse(localStorage.getItem(key) || '[]');
            arr.push(data);
            localStorage.setItem(key, JSON.stringify(arr));
        } catch(e) { console.warn('localStorage 寫入失敗', e); }
    }

    function loadTodayHistory() {
        if (!userProfile) return;
        try {
            const arr = JSON.parse(localStorage.getItem(getStorageKey()) || '[]');
            const section = document.getElementById('historySection');
            const list    = document.getElementById('historyList');

            if (arr.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = arr.slice(-5).reverse().map(item => `
                <div class="history-item">
                    <span class="history-time">⏰ ${new Date(item.timestamp).toLocaleTimeString('zh-TW')}</span>
                    <span class="history-loc">📍 ${item.location}</span>
                </div>
            `).join('');
        } catch(e) { console.warn('歷史載入失敗', e); }
    }

    initLIFF();
</script>
</body>
</html>
